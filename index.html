<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Mirror Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav id="top-nav" class="hidden">
      <img src="assets/logo-puce-80.svg" alt="PUCE" class="nav-logo" />
      <button id="btn-home">🏠 Inicio</button>
      <span id="section-title">Sección</span>
    </nav>

    <section id="sec-home" class="active">
      <div class="hero">
        <img src="assets/logo-puce-80.svg" alt="PUCE aniversario" class="hero-logo" />
        <h1>AR Mirror Web</h1>
        <div class="menu-grid">
          <button class="card card-brand" onclick="window.showSection('yasuni')">
            🌿 Yasuni (principal)
          </button>
          <button class="card" onclick="window.showSection('animals')">
            🦁 Animales AR
          </button>
          <button class="card" onclick="window.showSection('senias')">
            ✋ Lengua de señas
          </button>
        </div>

        <h2 class="group-title">Suite de Juegos</h2>
        <div class="menu-grid menu-games">
          <button class="card" onclick="window.showSection('game')">
            🐦 Big Flappy Bird (Flappy Nose)
          </button>
          <button class="card" onclick="window.showSection('airpiano')">
            🎹 Air Piano
          </button>
          <button class="card" onclick="window.showSection('donkeyfitness')">
            🦍 Donkey Kong Fitness
          </button>
          <button class="card" onclick="window.showSection('antigravedad')">
            🪐 Antigravedad PUCE
          </button>
        </div>
      </div>
    </section>

    <section id="sec-app" class="hidden">
      <div class="canvas-container">
        <div id="loading-overlay" class="hidden">
          <div class="loader"></div>
          <p>Cargando modelos e IA...</p>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <!-- Dentro de <div class="canvas-container"> en index.html[cite: 12] -->
        <div id="game-over-screen" class="hidden">
          <div class="menu-box">
            <h2>¡Puntuación Final!</h2>
            <h1 id="final-score">0</h1>
            <button id="restart-btn">Intentar de Nuevo</button>
            <button onclick="window.showSection('home')">Menú Principal</button>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
